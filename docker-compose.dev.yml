services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      DJANGO_SETTINGS_MODULE: codereview.settings.dev
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: codereview
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: postgres
      DB_PORT: "5432"
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: django-insecure-dev-only-key
      ALLOWED_HOSTS: localhost,127.0.0.1,0.0.0.0
      AI_REVIEW_MOCK: "True"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - dev_network

  celery:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: celery -A codereview worker -l info --pool=solo
    volumes:
      - .:/app
    environment:
      DJANGO_SETTINGS_MODULE: codereview.settings.dev
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: codereview
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: postgres
      DB_PORT: "5432"
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: django-insecure-dev-only-key
      AI_REVIEW_MOCK: "True"
    depends_on:
      - redis
      - web
    networks:
      - dev_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      VITE_API_TARGET: http://web:8000
    depends_on:
      - web
    networks:
      - dev_network

  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: codereview
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST_AUTH_METHOD: md5
    ports:
      - "5432:5432"
    volumes:
      - dev_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - dev_network

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - dev_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - dev_network

volumes:
  dev_postgres_data:
  dev_redis_data:

networks:
  dev_network:
    driver: bridge
