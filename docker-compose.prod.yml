version: "3.9"

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env.prod
    environment:
      DJANGO_SETTINGS_MODULE: codereview.settings.prod
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - codereview_network

  celery:
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A codereview worker -l info --pool=solo
    env_file: .env.prod
    environment:
      DJANGO_SETTINGS_MODULE: codereview.settings.prod
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - codereview_network

  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A codereview beat -l info
    env_file: .env.prod
    environment:
      DJANGO_SETTINGS_MODULE: codereview.settings.prod
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - codereview_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - web
    networks:
      - codereview_network

  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: codereview
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST_AUTH_METHOD: md5
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - codereview_network

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - codereview_network

volumes:
  postgres_data:
  redis_data:

networks:
  codereview_network:
    driver: bridge
